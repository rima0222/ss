<!doctype html><html lang="fa" dir="rtl"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ورود مدیر</title><link rel="stylesheet" href="/static/app.css"></head>
<body class="login-page">
<div class="background-grid"></div><main class="login-panel glass">
<div class="login-logo">CP</div><span class="eyebrow">SECURE ACCESS</span><h1>ورود مدیر</h1>
<p>SSH Suite Control Panel</p>
{% if error %}<div class="notice error">{{error}}</div>{% endif %}
<form method="post" class="stack">
<input name="username" placeholder="نام کاربری" autocomplete="username" required>
<input name="password" type="password" placeholder="رمز عبور" autocomplete="current-password" required>
<button class="btn primary">ورود به پنل</button>
</form></main></body></html>
